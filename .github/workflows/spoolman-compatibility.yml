name: Spoolman Compatibility

on:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Compile filaments
        run: python scripts/compile_filaments.py
      - name: Validate compiled output
        run: python scripts/validate.py
      - name: Check latest Spoolman external DB contract
        run: python scripts/check_spoolman_compat.py
