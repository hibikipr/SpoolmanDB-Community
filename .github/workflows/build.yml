name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run validation script
        run: python scripts/validate.py
      - name: Run unit tests
        run: python -m pytest tests/
  compile:
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Compile filaments
        run: python3 scripts/compile_filaments.py
      - name: Install validation dependencies
        run: python -m pip install jsonschema
      - name: Validate compiled output
        run: python scripts/validate.py
      - uses: actions/upload-artifact@v4
        with:
          name: filaments
          path: filaments.json
          if-no-files-found: error

  # Single deploy job since we're just deploying
  deploy:
    if: ${{ github.event_name != 'pull_request' }}
    needs: [compile]
    concurrency:
      group: "pages"
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Restore artifacts
        uses: actions/download-artifact@v8
        with:
          name: filaments
          path: public
      - name: Copy remaining data
        run: |
          cp materials.json public/
          cp filaments.schema.json public/
          cp materials.schema.json public/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
